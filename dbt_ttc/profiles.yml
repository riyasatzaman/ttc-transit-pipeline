# dbt connection profile for the TTC Transit Analytics Pipeline.
#
# This file is safe to commit because it contains only env_var references
# (no hard-coded credentials). The actual values are sourced from .env.

ttc_analytics:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'ACCOUNTADMIN') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_WH') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'TTC_ANALYTICS') }}"
      schema: STAGING
      threads: 4
      client_session_keep_alive: False
